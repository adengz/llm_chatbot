services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 127.0.0.1 9042 -e \"SELECT now() FROM system.local\" >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  scylla-init:
    image: scylladb/scylla:latest
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./init.cql:/init.cql
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "until cqlsh scylla -e \"describe keyspaces\" >/dev/null 2>&1; do echo 'waiting for scylla...'; sleep 2; done; cqlsh scylla -f /init.cql",
      ]
