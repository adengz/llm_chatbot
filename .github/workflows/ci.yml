name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OLLAMA_BASE_URL: http://localhost:11434/v1
      OLLAMA_TEST_MODEL: qwen3:0.6b
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync

    - name: Setup Ollama
      uses: ai-action/setup-ollama@v2

    - name: Cache Ollama model
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ollama-${{ env.OLLAMA_TEST_MODEL }}

    - name: Pull Ollama test model
      run: ollama pull "$OLLAMA_TEST_MODEL"

    - name: Start database
      run: docker compose up -d

    - name: Wait for database
      run: |
        timeout 60 bash -c 'until docker compose exec -T cassandra cqlsh -e "describe keyspace chatbot" > /dev/null 2>&1; do sleep 1; done'

    - name: Run tests
      run: uv run pytest --cov=api --cov-report=term-missing

    - name: Shutdown database
      if: always()
      run: docker compose down