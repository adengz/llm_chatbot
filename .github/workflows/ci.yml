name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OLLAMA_TEST_MODEL: qwen3:0.6b
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start database
      run: docker compose up -d --wait

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: 'backend/.python-version'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          backend/.venv
        key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Setup Ollama
      uses: ai-action/setup-ollama@v2

    - name: Cache Ollama model
      id: ollama-cache
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ollama-${{ runner.os }}-${{ env.OLLAMA_TEST_MODEL }}

    - name: Pull Ollama test model
      if: steps.ollama-cache.outputs.cache-hit != 'true'
      run: ollama pull "$OLLAMA_TEST_MODEL"

    - name: Run tests
      run: uv run pytest --cov=api --cov-report=term-missing

    - name: Shutdown database
      if: always()
      run: docker compose down